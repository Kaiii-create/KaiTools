name: Bug 反馈
description: 报告可以稳定复现的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: KTool 版本
      placeholder: 例如 0.1.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: 例如 Windows 11 23H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序描述如何触发问题。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果与实际结果
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图或日志
      description: 可直接拖入截图，日志请注意隐藏隐私信息。

