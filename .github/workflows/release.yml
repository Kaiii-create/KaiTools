name: Release Windows

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($tagVersion -ne $packageVersion -or $tagVersion -ne $tauriVersion) {
            throw "Tag version $tagVersion must match package.json and tauri.conf.json"
          }

      - name: Build and publish Windows installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: KTool ${{ github.ref_name }}
          releaseBody: |
            下载 `KTool_*_x64-setup.exe` 安装版，或下载 `.msi` 安装包。

            Windows 可能提示“未知发布者”，这是因为当前版本尚未购买代码签名证书，请确认下载来源为本仓库后继续安装。
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: KTool_[version]_[arch][setup].[ext]

