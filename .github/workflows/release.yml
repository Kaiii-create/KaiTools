name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        shell: pwsh
        run: |
          $tagVersion = "${{ inputs.tag || github.ref_name }}".TrimStart("v")
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($tagVersion -ne $packageVersion -or $tagVersion -ne $tauriVersion) {
            throw "Tag version $tagVersion must match package.json and tauri.conf.json"
          }

      - name: Build and publish Windows installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: KTool ${{ inputs.tag || github.ref_name }}
          releaseBody: |
            下载 `KTool_*_x64-setup.exe`，双击即可安装。

            若 Windows 显示“未知发布者”，说明该构建尚未完成代码签名。请确认下载来源为本仓库后继续安装。

            ## Code signing policy

            Free code signing provided by [SignPath.io](https://about.signpath.io/), certificate by [SignPath Foundation](https://signpath.org/).

            - Committers and reviewers: [Kaiii-create](https://github.com/Kaiii-create)
            - Approvers: [Kaiii-create](https://github.com/Kaiii-create)
            - Privacy policy: [PRIVACY.md](https://github.com/Kaiii-create/KaiTools/blob/main/PRIVACY.md)

            This program will not transfer any information to other networked systems unless specifically requested by the user, such as when using the HTTP request tool, loading a user-provided remote resource, or opening an external link.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: --bundles nsis,msi
